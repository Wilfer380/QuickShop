<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 620" preserveAspectRatio="xMidYMid slice" role="img" aria-labelledby="title desc">
  <title id="title">Premium vehicle silhouette</title>
  <desc id="desc">A dark performance car silhouette with soft amber and blue light trails.</desc>
