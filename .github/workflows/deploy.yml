name: Deploy to VPS (prod)

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  test:
    name: Run test suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, bcmath, ctype, curl, dom, fileinfo, json, openssl, pdo, pdo_sqlite, tokenizer, xml, zip
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend assets
        run: npm run build

      - name: Prepare SQLite database
        run: |
          mkdir -p database
          touch database/database.sqlite
          cp .env.example .env
          php artisan key:generate

      - name: Run migrations
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
        run: php artisan migrate --force

      - name: Run tests
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ${{ github.workspace }}/database/database.sqlite
        run: php artisan test

  deploy:
    name: Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}

    steps:
      - name: Check deploy secrets
        id: secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          if [ -z "$VPS_HOST" ] || [ -z "$VPS_USER" ] || [ -z "$VPS_PATH" ] || [ -z "$VPS_SSH_KEY" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "Deploy secrets are not configured yet; skipping VPS deployment."
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Checkout code
        if: steps.secrets.outputs.configured == 'true'
        uses: actions/checkout@v4

      - name: Start SSH agent
        if: steps.secrets.outputs.configured == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Add VPS host to known hosts
        if: steps.secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: ssh-keyscan -H "$VPS_HOST" >> ~/.ssh/known_hosts

      - name: Deploy application
        if: steps.secrets.outputs.configured == 'true'
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PATH: ${{ secrets.VPS_PATH }}
        run: |
          ssh "$VPS_USER@$VPS_HOST" "cd '$VPS_PATH' && git fetch origin main && git reset --hard origin/main && composer install --no-interaction --no-dev --prefer-dist --optimize-autoloader && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"